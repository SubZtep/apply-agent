services:
  ollama:
    image: ollama/ollama
    pull_policy: weekly
    environment:
      OLLAMA_MODELS: /tmp/models
    ports:
      - "11434:11434"
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"
      start_period: 3s
    volumes:
      - ./data/models:/tmp/models

  agent:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    entrypoint: ["./scripts/start.sh"]
    volumes:
      - ./data:/app/data
